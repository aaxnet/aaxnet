<svg width="900" height="200" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>aaxnet GitHub profile banner</title>
  <defs>
    <pattern id="grid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.9" fill="rgba(255,255,255,0.055)"/>
    </pattern>
    <linearGradient id="fade-r" x1="0" y1="0" x2="1" y2="0">
      <stop offset="55%" stop-color="#0c0f15" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0c0f15" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0"/>
      <stop offset="30%" stop-color="#6d28d9"/>
      <stop offset="70%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="680" height="200" fill="#0c0f15"/>
  <rect width="680" height="200" fill="url(#grid)"/>
  <g opacity="0.18">
    <circle cx="510" cy="62"  r="3"   fill="#8b9cba"/>
    <circle cx="565" cy="88"  r="2"   fill="#8b9cba"/>
    <circle cx="538" cy="120" r="4"   fill="#8b9cba"/>
    <circle cx="590" cy="140" r="2"   fill="#8b9cba"/>
    <circle cx="618" cy="78"  r="2.5" fill="#8b9cba"/>
    <circle cx="640" cy="110" r="2"   fill="#8b9cba"/>
    <circle cx="480" cy="100" r="2.5" fill="#8b9cba"/>
    <circle cx="556" cy="158" r="2"   fill="#8b9cba"/>
    <line x1="510" y1="62"  x2="565" y2="88"  stroke="#8b9cba" stroke-width="0.8"/>
    <line x1="565" y1="88"  x2="538" y2="120" stroke="#8b9cba" stroke-width="0.8"/>
    <line x1="565" y1="88"  x2="618" y2="78"  stroke="#8b9cba" stroke-width="0.8"/>
    <line x1="538" y1="120" x2="590" y2="140" stroke="#8b9cba" stroke-width="0.8"/>
    <line x1="590" y1="140" x2="640" y2="110" stroke="#8b9cba" stroke-width="0.8"/>
    <line x1="618" y1="78"  x2="640" y2="110" stroke="#8b9cba" stroke-width="0.8"/>
    <line x1="480" y1="100" x2="510" y2="62"  stroke="#8b9cba" stroke-width="0.8"/>
    <line x1="480" y1="100" x2="538" y2="120" stroke="#8b9cba" stroke-width="0.8"/>
    <line x1="538" y1="120" x2="556" y2="158" stroke="#8b9cba" stroke-width="0.8"/>
    <line x1="590" y1="140" x2="556" y2="158" stroke="#8b9cba" stroke-width="0.8"/>
