  <rect x="58" y="126" width="230" height="1.5" rx="0.75" fill="#6d28d9" opacity="0.5"/>
  <text x="59" y="151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#5a6478" letter-spacing="0.3">Python  ·  Security  ·  Telegram  ·  Automation</text>
  <text x="638" y="188" font-family="'Courier New', Courier, monospace" font-size="10" fill="#2e3540" text-anchor="end" letter-spacing="1">BY AAXNET</text>
