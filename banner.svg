  <rect width="680" height="200" fill="url(#fade-r)"/>
  <rect x="40" y="48" width="2.5" height="104" rx="1.25" fill="url(#accent-line)"/>
  <circle cx="41.25" cy="48" r="3" fill="#6d28d9" opacity="0.6"/>
  <circle cx="41.25" cy="48" r="6" fill="#6d28d9" opacity="0.15"/>
